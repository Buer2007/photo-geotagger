name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'gps-tracker-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake openjdk-17-jdk-headless zip unzip
        pip install buildozer cython

    - name: Build APK
      run: |
        cd gps-tracker-app
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gps-tracker-apk
        path: gps-tracker-app/bin/*.apk
