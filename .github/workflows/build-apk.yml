name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'gps-tracker-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake openjdk-17-jdk-headless zip unzip
        pip install buildozer cython

    - name: Build APK
      run: |
        cd gps-tracker-app
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: gps-tracker-apk
        path: gps-tracker-app/bin/*.apk

    - name: Get version
      id: version
      run: echo "version=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: GPS轨迹记录器 v${{ steps.version.outputs.version }}
        body: |
          ## GPS轨迹记录器 Android App

          ### 功能
          - GPS轨迹记录（后台持续运行）
          - 高德地图轨迹显示
          - 历史轨迹管理
          - GPX文件导出

          ### 安装方法
          1. 下载下方的 `.apk` 文件
          2. 传到安卓手机
          3. 打开安装（允许未知来源）
        files: gps-tracker-app/bin/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
